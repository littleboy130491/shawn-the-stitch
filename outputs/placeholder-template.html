<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Placeholder Template</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/placeholders.css">
  </head>
  <body>
    <main id="placeholder-template" class="mx-auto max-w-5xl space-y-10 px-6 py-10">
      <section id="image-placeholders" class="space-y-4">
        <h1 class="text-4xl">Image Placeholders</h1>
        <div class="grid gap-4 md:grid-cols-3">
          <div id="hero-image-placeholder" class="placeholder-image md:col-span-2">
            <span>Hero image</span>
          </div>
          <div id="portrait-image-placeholder" class="placeholder-image is-portrait">
            <span>Portrait image</span>
          </div>
          <div id="square-image-placeholder" class="placeholder-image is-square">
            <span>Square image</span>
          </div>
          <div id="card-image-placeholder" class="placeholder-image">
            <span>Card image</span>
          </div>
          <div id="gallery-image-placeholder" class="placeholder-image">
            <span>Gallery image</span>
          </div>
        </div>
      </section>

      <section id="icon-placeholders" class="space-y-4">
        <h2 class="text-3xl">Icon Placeholders</h2>
        <div class="flex flex-wrap items-center gap-4">
          <div id="small-icon-placeholder" class="placeholder-icon is-small">
            <span>Icon</span>
          </div>
          <div id="default-icon-placeholder" class="placeholder-icon">
            <span>Icon</span>
          </div>
          <div id="large-icon-placeholder" class="placeholder-icon is-large">
            <span>Icon</span>
          </div>
          <div id="logo-placeholder" class="placeholder-logo w-56">
            <span>Brand logo</span>
          </div>
          <div id="avatar-placeholder" class="placeholder-avatar">
            <span>User</span>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
